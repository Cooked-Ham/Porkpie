services:
  porkpie-server:
    build:
      context: ../..
      dockerfile: crates/porkpie-api/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: sqlite:/app/data/porkpie.db
      API_PORT: 8000
      API_KEY: dev-key-change-in-production
    volumes:
      - porkpie-data:/app/data

volumes:
  porkpie-data:
