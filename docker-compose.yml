services:
  porkpie-server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: sqlite:/app/data/porkpie.db
      API_PORT: 8000
      API_KEY: ${API_KEY:?Set API_KEY in .env or environment}
    volumes:
      - porkpie-data:/app/data

volumes:
  porkpie-data:
